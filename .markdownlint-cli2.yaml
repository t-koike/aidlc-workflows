# markdownlint-cli2 configuration
# https://github.com/DavidAnson/markdownlint-cli2
# Run: npx markdownlint-cli2 "**/*.md"
# Fix: npx markdownlint-cli2 --fix "**/*.md"

config:
  # ============================================================
  # PERMANENTLY DISABLED — conflict with project documentation style
  # ============================================================

  # Line-length — long URLs, tables, code examples, ASCII diagrams
  MD013: false

  # Inline HTML — <img> tags for screenshots/badges in README
  MD033: false

  # Duplicate headings — section names repeat across platform guides
  MD024: false

  # Emphasis as heading — bold text used as sub-labels in lists
  MD036: false

  # First-line heading — pointer/import files (e.g. CLAUDE.md is just
  # "@AGENTS.md") and banner-first docs legitimately don't open with an H1.
  MD041: false

  # ============================================================
  # STYLE SETTINGS
  # ============================================================

  # Tables must use aligned column style (pipes vertically aligned)
  MD060:
    style: "aligned"

# Ignore generated/vendored/test fixture files.
# Scope: this gate covers the evaluator/ framework and top-level repo docs.
# The unified v2 framework dirs (core/, harness/, dist/, docs/) and their large
# generated markdown corpora maintain their own conventions and are out of scope.
ignores:
  - "node_modules/**"
  - "**/node_modules/**"
  - ".claude/**"
  - "**/.venv/**"
  # Evaluator test-case inputs and golden-master fixtures are AIDLC-generated /
  # hand-authored test data; reformatting them would alter scorer baselines.
  - "evaluator/test_cases/**"
  # Generated evaluation run workspaces.
  - "evaluator/runs/**"
  # Unified v2 framework trees — generated/maintained separately, out of scope
  # for this gate (keep markdownlint focused on evaluator/ + top-level docs).
  - "core/**"
  - "harness/**"
  - "dist/**"
  - "docs/**"
  - "tests/**"
  # Pre-rebase top-level harness dirs — absent on a clean v2 checkout; ignored
  # so local working trees with leftovers don't diverge from CI.
  - "claude-code/**"
  - "kiro/**"
  # CHANGELOG.md is auto-generated by git-cliff (cliff.toml controls its format).
  # git-cliff postprocessors run per-body so inter-body spacing and trailing
  # whitespace cannot be fully controlled via template alone.
  - "CHANGELOG.md"
