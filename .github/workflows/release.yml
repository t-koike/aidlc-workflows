name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        type: string
        required: true
      draft:
        description: Publish as a draft release
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bash tests/run-tests.sh --ci --parallel 8

  native-smoke:
    needs: verify
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-13, macos-14]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test tests/unit/t238-build-binaries.test.ts

  build:
    needs: native-smoke
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
          - runner: ubuntu-latest
            target: bun-linux-x64-musl
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64-musl
          - runner: macos-13
            target: bun-darwin-x64
          - runner: macos-14
            target: bun-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun scripts/package.ts --check
      - run: bun scripts/build-binaries.ts --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: build/binaries

  musl-smoke:
    needs: build
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64-musl
            directory: linux-x64-musl
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64-musl
            directory: linux-arm64-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: build/binaries
      - run: chmod +x "build/binaries/${TARGET_DIR}/aidlc"
        env:
          TARGET_DIR: ${{ matrix.directory }}
      - run: docker run --rm -v "$PWD:/work:ro" alpine:3.20 "/work/build/binaries/${TARGET_DIR}/aidlc" version
        env:
          TARGET_DIR: ${{ matrix.directory }}

  publish:
    needs: [build, musl-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: build/binaries
          merge-multiple: true
      - run: test "$RELEASE_TAG" = "v$(bun -e 'import { AIDLC_VERSION } from "./core/tools/aidlc-version.ts"; process.stdout.write(AIDLC_VERSION)')"
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      - run: bun scripts/package-release.ts --require-release-matrix
      - run: gh release create "$RELEASE_TAG" build/release/* --verify-tag --generate-notes ${{ inputs.draft && '--draft' || '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/release/*
