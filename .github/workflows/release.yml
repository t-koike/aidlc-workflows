name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        type: string
        required: true
      draft:
        description: Publish as a draft release
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bash tests/run-tests.sh --ci --parallel 8
      - name: ShellCheck installer
        run: shellcheck scripts/install.sh

  native-smoke:
    needs: verify
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-15, windows-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test tests/unit/t238-build-binaries.test.ts
      - if: runner.os == 'Windows'
        run: bun test tests/unit/t244-install-management.test.ts -t "t244 Windows and completion release surfaces"
      - name: PSScriptAnalyzer installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          $findings = @(Invoke-ScriptAnalyzer -Path scripts/install.ps1)
          if ($findings.Count -gt 0) {
            $findings | Format-Table -AutoSize | Out-String | Write-Error
            exit 1
          }

  build:
    needs: native-smoke
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
            directory: linux-x64
          - runner: ubuntu-latest
            target: bun-linux-x64-musl
            directory: linux-x64-musl
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            directory: linux-arm64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64-musl
            directory: linux-arm64-musl
          - runner: macos-15-intel
            target: bun-darwin-x64
            directory: darwin-x64
          - runner: macos-15
            target: bun-darwin-arm64
            directory: darwin-arm64
          - runner: windows-latest
            target: bun-windows-x64
            directory: windows-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun scripts/package.ts --check
      - run: bun scripts/build-binaries.ts --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            build/binaries/${{ matrix.directory }}
            build/binaries/build-results-${{ matrix.directory }}.json

  musl-smoke:
    needs: build
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64-musl
            directory: linux-x64-musl
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64-musl
            directory: linux-arm64-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: build/binaries
      - run: chmod +x "build/binaries/${TARGET_DIR}/aidlc"
        env:
          TARGET_DIR: ${{ matrix.directory }}
      - run: docker run --rm -v "$PWD:/work:ro" alpine:3.20 "/work/build/binaries/${TARGET_DIR}/aidlc" version
        env:
          TARGET_DIR: ${{ matrix.directory }}

  stage-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: build/binaries
          merge-multiple: true
      - run: bun scripts/package-release.ts --require-release-matrix
      - uses: actions/upload-artifact@v4
        with:
          name: release-candidate
          path: build/release

  windows-lifecycle:
    needs: stage-release
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: build/release
      - name: Install, route through stable shim, and uninstall
        shell: pwsh
        run: |
          $env:AIDLC_INSTALL_ROOT = Join-Path $env:RUNNER_TEMP 'aidlc-machine'
          $env:AIDLC_BIN_DIR = Join-Path $env:AIDLC_INSTALL_ROOT 'bin'
          $env:AIDLC_ALLOW_ADMIN_INSTALL = '1'
          $releaseRoot = (Resolve-Path ./build/release).Path
          $probe = [Net.Sockets.TcpListener]::new([Net.IPAddress]::Loopback, 0)
          $probe.Start()
          $port = ([Net.IPEndPoint]$probe.LocalEndpoint).Port
          $probe.Stop()
          $server = Start-Job -ArgumentList $releaseRoot, $port -ScriptBlock {
            param($Root, $Port)
            $listener = [Net.HttpListener]::new()
            $listener.Prefixes.Add("http://localhost:$Port/")
            $listener.Start()
            try {
              while ($listener.IsListening) {
                $context = $listener.GetContext()
                $name = [IO.Path]::GetFileName($context.Request.Url.AbsolutePath)
                $path = Join-Path $Root $name
                if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                  $context.Response.StatusCode = 404
                  $context.Response.Close()
                  continue
                }
                $bytes = [IO.File]::ReadAllBytes($path)
                $context.Response.StatusCode = 200
                $context.Response.ContentLength64 = $bytes.Length
                $context.Response.OutputStream.Write($bytes, 0, $bytes.Length)
                $context.Response.Close()
              }
            } finally {
              $listener.Close()
            }
          }
          Start-Sleep -Milliseconds 500
          try {
            & ./build/release/install.ps1 -ReleaseBaseUrl "http://localhost:$port" -Harness claude -Quiet
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            Stop-Job $server -ErrorAction SilentlyContinue
            Remove-Job $server -Force -ErrorAction SilentlyContinue
          }
          $command = Join-Path $env:AIDLC_BIN_DIR 'aidlc.cmd'
          & $command version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $command harness add kiro --from $releaseRoot --quiet
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $command harness default kiro --quiet
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $command harness list --json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $command harness remove kiro --yes --quiet
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $command completions powershell | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & ./build/release/install.ps1 -From $releaseRoot -Offline -Harness claude -Quiet
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $pointer = Get-Content -Raw (Join-Path $env:AIDLC_INSTALL_ROOT 'active-executable')
          if ($pointer.Trim() -notmatch '\\versions\\[0-9]+\.[0-9]+\.[0-9]+\\aidlc\.exe$') {
            throw "invalid active executable pointer: $pointer"
          }
          & $command uninstall --purge --yes --quiet
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          for ($i = 0; $i -lt 100 -and (Test-Path -LiteralPath $command); $i++) {
            Start-Sleep -Milliseconds 100
          }
          if (Test-Path -LiteralPath $command) { throw 'aidlc.cmd survived uninstall' }
          if (Test-Path -LiteralPath $env:AIDLC_INSTALL_ROOT) { throw 'install root survived purge uninstall' }

  unix-lifecycle:
    needs: stage-release
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-15]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: build/release
      - name: Consume the release candidate online and offline
        shell: bash
        run: |
          set -euo pipefail
          release="$PWD/build/release"
          server_root="$RUNNER_TEMP/aidlc-release-server"
          mkdir -p "$server_root/latest/download"
          cp -R "$release/." "$server_root/latest/download/"
          python3 -m http.server 18765 --bind 127.0.0.1 --directory "$server_root" \
            >"$RUNNER_TEMP/aidlc-release-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for _ in {1..50}; do
            curl -fsS "http://127.0.0.1:18765/latest/download/version.json" >/dev/null && break
            sleep 0.1
          done

          export AIDLC_INSTALL_ROOT="$RUNNER_TEMP/aidlc-online"
          export AIDLC_BIN_DIR="$RUNNER_TEMP/aidlc-online-bin"
          sh "$release/install.sh" \
            --release-base-url "http://127.0.0.1:18765" \
            --harness claude --quiet
          online="$AIDLC_BIN_DIR/aidlc"
          env PATH="/usr/bin:/bin" "$online" version
          online_project="$RUNNER_TEMP/aidlc-online-project"
          mkdir -p "$online_project"
          env PATH="/usr/bin:/bin" "$online" init \
            --project-dir "$online_project" --mcp none --quiet
          env PATH="/usr/bin:/bin" "$online" doctor \
            --project-dir "$online_project" --quiet

          export AIDLC_INSTALL_ROOT="$RUNNER_TEMP/aidlc-offline"
          export AIDLC_BIN_DIR="$RUNNER_TEMP/aidlc-offline-bin"
          sh "$release/install.sh" --from "$release" --offline \
            --harness opencode --quiet
          offline="$AIDLC_BIN_DIR/aidlc"
          env PATH="/usr/bin:/bin" "$offline" version
          env PATH="/usr/bin:/bin" "$offline" harness list --json |
            grep -q '"opencode"'
      - name: Exercise the interactive harness picker through a PTY
        shell: bash
        run: |
          set -euo pipefail
          release="$PWD/build/release"
          export AIDLC_INSTALL_ROOT="$RUNNER_TEMP/aidlc-picker"
          export AIDLC_BIN_DIR="$RUNNER_TEMP/aidlc-picker-bin"
          transcript="$RUNNER_TEMP/aidlc-picker.log"
          if [[ "$(uname -s)" == "Darwin" ]]; then
            printf '1\n' | script -q "$transcript" \
              sh "$release/install.sh" --from "$release" --offline
          else
            printf '1\n' | script -qec \
              "sh '$release/install.sh' --from '$release' --offline" \
              "$transcript"
          fi
          grep -q "Select the harness distribution to install:" "$transcript"
          grep -q "Harness \\[1-" "$transcript"
          "$AIDLC_BIN_DIR/aidlc" harness list --json | grep -q '"claude"'

  publish:
    needs: [musl-smoke, windows-lifecycle, unix-lifecycle]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-candidate
          path: build/release
      - run: test "$RELEASE_TAG" = "v$(jq -r .version build/release/version.json)"
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      - name: Re-verify staged release checksums
        working-directory: build/release
        run: sha256sum -c checksums.txt
      - run: gh release create "$RELEASE_TAG" build/release/* --verify-tag --generate-notes ${{ inputs.draft && '--draft' || '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: build/release/*
